<!DOCTYPE html>
<html>
<head>
    <link rel="stylesheet" href="https://pyscript.net/latest/pyscript.css" />
    <script defer src="https://pyscript.net/latest/pyscript.js"></script>
</head>
<body>
    <textarea id="editor" rows="10" cols="30">print("Hello from Python!")</textarea>
    <button py-click="run_python">Run</button>
    <div id="output"></div>

    <py-script>
        def run_python():
            editor = Element("editor").element.value
            pyscript.write("output", editor)
    </py-script>
</body>
</html>
